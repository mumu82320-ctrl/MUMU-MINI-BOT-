services:
  - type: web
    name: mumu-mini-bot
    env: node
    buildCommand: npm install --production
    startCommand: node silva.js
    healthCheckPath: /health
    envVars:
      - key: SESSION_ID
        sync: false
      - key: PREFIX
        value: .
      - key: BOT_NAME
        value: "Mumu Mini Bot"
      - key: MODE
        value: both
      - key: OWNER_NUMBER
        sync: false
      - key: PORT
        value: "25680"
